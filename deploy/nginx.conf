server {
    listen 80;
    server_name seattleshowtimes.com www.seattleshowtimes.com;

    # Redirect HTTP to HTTPS (after certbot sets up SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name seattleshowtimes.com www.seattleshowtimes.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/seattleshowtimes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seattleshowtimes.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Static frontend
    root /var/www/seattleshowtimes/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — proxy to FastAPI/uvicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
